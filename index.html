<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>ひきこもり教 - 信者名簿</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>ひきこもり教 聖典名簿</h1>
    <p>〜 救済か、それともウンチ料理か 〜</p>
</header>

<main>
    <h2 class="section-title">生存している信者</h2>
    <div class="member-grid">
        <div class="card">
            <div class="card-header">
                <div class="icon-group">
                    <img src="https://placehold.jp/444444/ffffff/120x120.png?text=Game" class="icon main-icon" alt="ゲーム内">
                    <img src="https://placehold.jp/882222/ffffff/100x100.png?text=User" class="icon sub-icon" alt="本人">
                </div>
                <h2>アリス</h2>
            </div>
            <div class="card-body">
                <div class="traits">
                    <span class="tag">死恐怖症</span><span class="tag">気高きウンチ職人</span><span class="tag">物質主義者</span>
                </div>
                <p class="description">教団ではじめての信者。高齢になったあと若返るが、食中毒で死亡。儀式により蘇生。</p>
            </div>
        </div>
        
        </div>

    <h2 class="section-title">昇天・死亡した信者</h2>
    <div class="member-grid">
        <div class="card dead">
            <div class="card-header">
                <div class="icon-group">
                    <img src="https://placehold.jp/444444/ffffff/120x120.png?text=Game" class="icon main-icon" alt="ゲーム内">
                    <img src="https://placehold.jp/333333/ffffff/100x100.png?text=User" class="icon sub-icon" alt="本人">
                </div>
                <h2>まるこぺーろ</h2>
            </div>
            <div class="card-body">
                <div class="traits">
                    <span class="tag">無信仰</span><span class="tag">細菌恐怖症</span>
                </div>
                <p class="description">人間として生き、人間として死ぬことを選んだ。寿命。</p>
            </div>
        </div>

        <div class="card dead">
            <div class="card-header">
                <div class="icon-group">
                    <img src="https://placehold.jp/444444/ffffff/120x120.png?text=Game" class="icon main-icon" alt="ゲーム内">
                    <img src="https://placehold.jp/333333/ffffff/100x100.png?text=User" class="icon sub-icon" alt="本人">
                </div>
                <h2>つくえ</h2>
            </div>
            <div class="card-body">
                <div class="traits">
                    <span class="tag">無信仰</span><span class="tag">病弱</span><span class="tag">皮肉屋</span>
                </div>
                <p class="description">Aketokiの恋人。ウンチ料理を食べさせられ病死。話がつまらない疑惑がある。</p>
            </div>
        </div>
    </div>
</main>

</body>
</html>
